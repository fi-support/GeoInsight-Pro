<script>
    // --- DOM Elements ---
    const clientIdInput = document.getElementById('clientIdInput');
    const cognitoDomainInput = document.getElementById('cognitoDomainInput');
    const redirectUriInput = document.getElementById('redirectUriInput');
    const cognitoRegionInput = document.getElementById('cognitoRegionInput');

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const authSection = document.getElementById('auth-section');
    const loggedInSection = document.getElementById('logged-in-section');
    const accessTokenDisplay = document.getElementById('access-token');
    const idTokenDisplay = document.getElementById('id-token');
    const messageContainer = document.getElementById('message-container');
    const callApiBtn = document.getElementById('call-api-btn');
    const callBimApiBtn = document.getElementById('call-bim-api-btn');

    // --- Configuration (Dynamically updated from inputs) ---
    let CLIENT_ID = clientIdInput.value;
    let COGNITO_USER_POOL_DOMAIN = cognitoDomainInput.value;
    let REDIRECT_URI = redirectUriInput.value;
    let COGNITO_REGION = cognitoRegionInput.value;

    // Update config variables when input fields change
    clientIdInput.addEventListener('input', (e) => CLIENT_ID = e.target.value);
    cognitoDomainInput.addEventListener('input', (e) => COGNITO_USER_POOL_DOMAIN = e.target.value);
    redirectUriInput.addEventListener('input', (e) => REDIRECT_URI = e.target.value);
    cognitoRegionInput.addEventListener('input', (e) => COGNITO_REGION = e.target.value);

    // --- PKCE Helper Functions ---
    function generateRandomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let text = '';
        for (let i = 0; i < length; i++) {
            text += possible.charAt(Math.floor(Math.random() * possible.length));
        }
        return text;
    }

    async function sha256(plain) {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest('SHA-256', data);
    }

    function base64urlencode(buffer) {
        const bytes = new Uint8Array(buffer);
        let str = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            str += String.fromCharCode(bytes[i]);
        }
        return btoa(str)
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=/g, '');
    }

    async function generateCodeChallenge(codeVerifier) {
        const hashed = await sha256(codeVerifier);
        return base64urlencode(hashed);
    }

    // --- UI Helper Functions ---
    function showMessage(message, type = 'info') {
        messageContainer.textContent = message;
        let bgColor, borderColor, textColor;
        if (type === 'error') {
            bgColor = 'bg-red-100';
            borderColor = 'border-red-300';
            textColor = 'text-red-800';
        } else if (type === 'success') {
            bgColor = 'bg-green-100';
            borderColor = 'border-green-300';
            textColor = 'text-green-800';
        } else { // info
            bgColor = 'bg-blue-100';
            borderColor = 'border-blue-300';
            textColor = 'text-blue-800';
        }
        messageContainer.className = `message-box mt-4 ${bgColor} ${borderColor} ${textColor}`;
        messageContainer.classList.remove('hidden');
    }

    function hideMessage() {
        messageContainer.classList.add('hidden');
    }

    function updateLoggedInUI(accessToken, idToken) {
        accessTokenDisplay.textContent = accessToken;
        idTokenDisplay.textContent = idToken;
        authSection.classList.add('hidden');
        loggedInSection.classList.remove('hidden');
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
    }

    function updateLoggedOutUI() {
        accessTokenDisplay.textContent = '';
        idTokenDisplay.textContent = '';
        authSection.classList.remove('hidden');
        loggedInSection.classList.add('hidden');
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
    }

    // --- Core Authentication Flow ---
    async function initiateLogin() {
        hideMessage();
        if (!COGNITO_USER_POOL_DOMAIN || !CLIENT_ID || !REDIRECT_URI || REDIRECT_URI.includes('<YOUR')) {
            showMessage('Please fill in all OUP IAM Configuration fields with your specific values.', 'error');
            return;
        }

        // --- IMPORTANT FIX: Clean the domain name ---
        // Ensure the domain doesn't have a protocol prefix
        const cleanDomain = COGNITO_USER_POOL_DOMAIN.replace(/^https?:\/\//, '');

        const codeVerifier = generateRandomString(128);
        const codeChallenge = await generateCodeChallenge(codeVerifier);
        sessionStorage.setItem('pkce_code_verifier', codeVerifier);

        const authUrl = `https://${cleanDomain}/oauth2/authorize?` +
                       `response_type=code&` +
                       `client_id=${CLIENT_ID}&` +
                       `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                       `scope=openid+profile+email&` +
                       `code_challenge=${codeChallenge}&` +
                       `code_challenge_method=S256`;

        showMessage('Redirecting to OUP login page...', 'info');
        window.location.href = authUrl;
    }

    async function exchangeCodeForTokens(code, codeVerifier) {
        hideMessage();
        showMessage('Exchanging authorization code for tokens (simulated)...', 'info');
        // --- SIMULATION FOR DEMO ---
        const dummyAccessToken = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhbGljZS1wbGFubmVyLTEyMyIsImV2ZW50X2lkIjoiZHVtbXktZXZlbnQtaWQiLCJ0b2tlbl91c2UiOiJhY2Nlc3MiLCJzY29wZSI6Im9wZW5pZCBwcm9maWxlIGVtYWlsIiwiYXV0aF90aW1lIjoxNjc4ODg2NDAwLCJpc3MiOiJodHRwczovL2NvZ25pdG8taWRwLmF1LXByb3h5LmFtYXpvbmF3cy5jb20vY29nbml0by11c2VyLXBvb2wtaWQiLCJleHAiOjE2Nzg4OTAwMDAsInVzZXJuYW1lIjoiYWxpY2UucGxhbm5lciIsImNsaWVudF9pZCI6IjR1Mm9nM2oxdnI4cDhhNGF0MWNsM2psYm4ifQ.SIMULATED_ACCESS_TOKEN_SIGNATURE`;
        const dummyIdToken = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhbGljZS1wbGFubmVyLTEyMyIsImVtYWlsX3ZlcmlmaWVkIjp0cnVlLCJpc3MiOiJodHRwczovL2NvZ25pdG8taWRwLmF1LXByb3h5LmFtYXpvbmF3cy5jb20vY29nbml0by11c2VyLXBvb2wtaWQiLCJjb2duaXRvOnVzZXJuYW1lIjoiYWxpY2UucGxhbm5lciIsImF1ZCI6IjR1Mm9nM2oxdnI4cDhhNGF0MWNsM2psYm4iLCJldmVudF9pZCI6ImR1bW15LWV2ZW50LWlkIiwidG9rZW5fdXNlIjoiaWQiLCJhdXRoX3RpbWUiOjE2Nzg4ODY0MDAsImV4cCI6MTY3ODg5MDAwMCwiaWF0IjoxNjc4ODg2NDAwLCJlbWFpbCI6ImFsaWNlLnBsYW5uZXJAZGVuYm9zY2gubmwiLCJjdXN0b206b3JnYW5pemF0aW9uIjoiRGVuIEJvc2NoIENpdHkiLCJjdXN0b206cm9sZSI6IkNpdHkgUGxhbm5lciJ9.SIMULATED_ID_TOKEN_SIGNATURE`;
        
        localStorage.setItem('accessToken', dummyAccessToken);
        localStorage.setItem('idToken', dummyIdToken);
        updateLoggedInUI(dummyAccessToken, dummyIdToken);
        showMessage('Successfully obtained simulated tokens from OUP!', 'success');
        // --- END SIMULATION ---
    }

    function handleLogout() {
        hideMessage();
        localStorage.removeItem('accessToken');
        localStorage.removeItem('idToken');
        sessionStorage.removeItem('pkce_code_verifier');
        updateLoggedOutUI();

        showMessage('Logged out successfully.', 'info');
    }

    function simulateOupApiCall() {
        const accessToken = localStorage.getItem('accessToken');
        if (!accessToken) {
            showMessage('No Access Token found. Please log in first.', 'error');
            return;
        }
        showMessage('Simulating OUP API call with Access Token...', 'info');
        setTimeout(() => {
            showMessage('OUP API call simulated successfully! (If this were real, your Access Token would be sent in the Authorization header.)', 'success');
        }, 1000);
    }

    function simulateBimApiCall() {
        const accessToken = localStorage.getItem('accessToken');
        if (!accessToken) {
            showMessage('No Access Token found. Please log in first.', 'error');
            return;
        }
        showMessage('Simulating Clearly.BIM API call with Access Token...', 'info');
        setTimeout(() => {
            showMessage('Clearly.BIM API call simulated successfully! (This would typically be a GraphQL query with your Access Token.)', 'success');
        }, 1000);
    }

    // --- Event Listeners ---
    loginBtn.addEventListener('click', initiateLogin);
    logoutBtn.addEventListener('click', handleLogout);
    callApiBtn.addEventListener('click', simulateOupApiCall);
    callBimApiBtn.addEventListener('click', simulateBimApiCall);

    // --- Initial Load Logic ---
    document.addEventListener('DOMContentLoaded', () => {
        const savedCognitoDomain = localStorage.getItem('cognitoUserPoolDomain');
        if (savedCognitoDomain) {
            cognitoDomainInput.value = savedCognitoDomain;
            COGNITO_USER_POOL_DOMAIN = savedCognitoDomain;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const codeVerifier = sessionStorage.getItem('pkce_code_verifier');

        if (code && codeVerifier) {
            window.history.replaceState({}, document.title, window.location.pathname);
            exchangeCodeForTokens(code, codeVerifier);
            sessionStorage.removeItem('pkce_code_verifier');
        } else if (localStorage.getItem('accessToken')) {
            updateLoggedInUI(localStorage.getItem('accessToken'), localStorage.getItem('idToken'));
            showMessage('You are already logged in (simulated session restored).', 'info');
        } else {
            updateLoggedOutUI();
        }
    });

    cognitoDomainInput.addEventListener('change', (e) => {
        localStorage.setItem('cognitoUserPoolDomain', e.target.value);
    });
</script>
