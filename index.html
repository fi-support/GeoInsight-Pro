<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clearly.Hub App Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- WELCOME PAGE -->
<div id="welcome-page" class="page">
    <h1>Welcome to the Clearly.Hub App Demo</h1>
    <p>This page serves as a central hub for connected applications.</p>
    <button class="primary" onclick="showIAMPage()">Launch External App</button>
</div>

<!-- IAM PAGE -->
<div id="iam-page" class="page">
    <h2>External App - Connect to OUP IAM</h2>

    <div>
        <label>Client ID:</label>
        <input id="clientId" type="text" value="4u2o3tjwpg4a6af14tjxjphn"><br>

        <label>Cognito Domain:</label>
        <input id="cognitoDomain" type="text" value="auth.clearly.app"><br>

        <label>Redirect URI:</label>
        <input id="redirectUri" type="text" value="https://smr-gm.ihp-ghub.io/ihp"><br>

        <label>Cognito Region:</label>
        <input id="region" type="text" value="eu-central-1"><br><br>

        <button class="primary" onclick="login()">Login to OUP</button>
        <button class="success" onclick="getPublicHubs()">Get Public Hubs</button>
        <button class="success" onclick="getAuthenticatedHubs()">Get Authenticated Hubs</button>
        <button class="danger" onclick="logout()">Logout</button>
    </div>

    <h3>Connected Hubs:</h3>
    <ul id="hubsList"></ul>

    <h3>Your JWTs:</h3>
    <div>
        <strong>Access Token:</strong>
        <div id="accessToken" class="token-box"></div>
        <strong>ID Token:</strong>
        <div id="idToken" class="token-box"></div>
    </div>

    <h3>API Response</h3>
    <div id="apiResponse" class="token-box"></div>
</div>

<script src="app.js"></script>
</body>
</html>
